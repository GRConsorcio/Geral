<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
@import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;700;900&display=swap');
:root{
  --gold:#C9A84C;--gold-light:#E8C97A;--gold-dark:#8B6914;
  --bk:#0A0A0A;--bk2:#111111;--bk3:#1A1A1A;
  --wh:#F5F0E8;--wh2:#DDD8CC;--bd:rgba(201,168,76,0.25);
  --col-sem:rgba(201,168,76,0.13);
  --col-tot:rgba(201,168,76,0.22);
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;background:var(--bk);overflow:hidden;}
.root{background:var(--bk);font-family:'Montserrat',sans-serif;color:var(--wh);display:flex;flex-direction:column;height:100vh;overflow:hidden;}

/* HEADER */
.hdr{background:var(--bk2);border-bottom:1px solid var(--bd);padding:.7rem 1rem .5rem;text-align:center;position:relative;flex-shrink:0;}
.hdr::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:180px;height:2px;background:linear-gradient(90deg,transparent,var(--gold),transparent);}
.logo-img{height:48px;width:auto;object-fit:contain;display:block;margin:0 auto 2px;}
.logo-sub{font-size:8px;letter-spacing:5px;color:var(--wh2);text-transform:uppercase;font-weight:300;}
.month-badge{display:inline-block;margin-top:4px;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);border:0.5px solid var(--bd);padding:2px 10px;border-radius:20px;}

/* NAV */
.nav-tabs{display:flex;background:var(--bk2);border-bottom:0.5px solid var(--bd);flex-shrink:0;}
.nav-tab{flex:1;padding:8px 4px;font-size:9px;letter-spacing:2px;text-transform:uppercase;text-align:center;color:var(--wh2);cursor:pointer;border:none;background:none;font-family:'Montserrat',sans-serif;border-bottom:2px solid transparent;transition:all .2s;}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(201,168,76,0.06);}
.panel{display:none;}.panel.active{display:flex;flex-direction:column;flex:1;min-height:0;}

/* MAIN LAYOUT */
.ranking-layout{display:flex;flex:1;min-height:0;overflow:hidden;}

/* SIDEBAR */
.sidebar{width:70px;flex-shrink:0;background:var(--bk2);border-right:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;overflow:hidden;}
.metric-card{width:100%;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:6px 4px;border-bottom:0.5px solid var(--bd);text-align:center;}
.metric-card:last-child{border-bottom:none;}
.metric-lbl{font-size:6px;letter-spacing:1px;text-transform:uppercase;color:var(--wh2);font-weight:400;line-height:1.4;margin-bottom:3px;}
.metric-val{font-size:20px;font-weight:700;color:var(--gold);line-height:1;}
.metric-val.small{font-size:14px;}
.meta-bar-bg{width:calc(100% - 12px);height:3px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden;margin-top:4px;}
.meta-bar-fg{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold-dark),var(--gold));transition:width .8s ease;}
.meta-pct-lbl{font-size:7px;color:var(--gold);margin-top:2px;letter-spacing:1px;font-weight:600;}
.sidebar-div{width:40px;height:0.5px;background:var(--bd);}
.conn-col{display:flex;flex-direction:column;align-items:center;gap:4px;padding:6px 0;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--gold);animation:blink 1.5s infinite;}
.live-lbl{font-size:6px;letter-spacing:1px;color:var(--wh2);text-transform:uppercase;}
.cs{display:flex;align-items:center;gap:3px;font-size:6px;letter-spacing:1px;color:var(--wh2);}
.cs-dot{width:6px;height:6px;border-radius:50%;background:#555;flex-shrink:0;}
.cs-dot.ok{background:#5DCAA5;}.cs-dot.err{background:#F0997B;}.cs-dot.wait{background:#C9A84C;animation:blink 1s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

/* RIGHT CONTENT */
.right-content{flex:1;min-width:0;display:flex;flex-direction:column;overflow:hidden;}

/* TABLE — grade dinâmica via JS */
.tbl-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* HEADER DA TABELA */
.tbl-head-row{display:grid;flex-shrink:0;border-bottom:1px solid var(--bd);background:var(--bk2);}
.th-pos{background:var(--bk2);display:flex;align-items:center;justify-content:center;padding:6px 2px;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-dark);font-weight:700;}
.th-name{background:var(--bk2);display:flex;align-items:center;padding:6px 8px;font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--gold-dark);font-weight:700;}
.th-sem{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5px 2px;font-size:7px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);font-weight:700;background:var(--col-sem);border-left:1px solid var(--bd);cursor:pointer;user-select:none;transition:background .2s;}
.th-sem:hover{background:rgba(201,168,76,0.25);}
.th-sem.active-col{background:rgba(201,168,76,0.30);color:var(--gold-light);}
.th-tot{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5px 2px;font-size:7px;letter-spacing:1px;text-transform:uppercase;color:var(--gold);font-weight:700;background:var(--col-tot);border-left:2px solid var(--gold-dark);}

/* LINHAS */
.tbl-body{flex:1;overflow:hidden;display:flex;flex-direction:column;}
.tbl-row{display:grid;flex:1;min-height:0;border-bottom:0.5px solid rgba(201,168,76,0.08);align-items:stretch;}
.tbl-row.r1{background:rgba(201,168,76,0.08);}
.tbl-row.r2{background:rgba(180,180,180,0.03);}
.tbl-row.r3{background:rgba(180,100,50,0.03);}
.tbl-row:last-child{border-bottom:none;}

.cell-pos{display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--wh2);}
.r1 .cell-pos{color:var(--gold);font-size:15px;}
.r2 .cell-pos{color:#C0C0C0;}
.r3 .cell-pos{color:#CD7F32;}

.cell-name{display:flex;flex-direction:column;justify-content:center;padding:4px 6px;overflow:hidden;}
.tname{font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--wh);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.r1 .tname{color:var(--gold-light);}
.tmeta{font-size:7px;color:var(--wh2);opacity:.5;letter-spacing:.5px;margin-top:1px;}
.barmini{height:2px;background:rgba(255,255,255,0.07);border-radius:1px;margin-top:2px;overflow:hidden;}
.barfill{height:100%;border-radius:1px;background:var(--gold);transition:width .5s ease;}
.r2 .barfill{background:#C0C0C0;}.r3 .barfill{background:#CD7F32;}

.cell-sem{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--col-sem);border-left:1px solid var(--bd);font-size:15px;font-weight:700;color:var(--wh2);transition:background .2s;}
.cell-sem.active-col{background:rgba(201,168,76,0.28);color:var(--wh);}
.cell-sem .acum{font-size:7px;color:var(--gold-dark);font-weight:400;margin-top:1px;letter-spacing:.5px;}

.cell-tot{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--col-tot);border-left:2px solid var(--gold-dark);font-size:18px;font-weight:900;color:var(--gold);}
.cell-tot .pct{font-size:7px;color:var(--gold-dark);font-weight:400;margin-top:1px;}

/* TOTAL ROW */
.tbl-total{display:grid;flex-shrink:0;border-top:1px solid var(--bd);background:var(--bk2);}
.tot-label{display:flex;align-items:center;padding:6px 8px;font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--gold);font-weight:700;}
.tot-sem-val{display:flex;align-items:center;justify-content:center;background:var(--col-sem);border-left:1px solid var(--bd);font-size:14px;font-weight:700;color:var(--wh);}
.tot-tot-val{display:flex;align-items:center;justify-content:center;background:var(--col-tot);border-left:2px solid var(--gold-dark);font-size:16px;font-weight:900;color:var(--gold);}

/* CONFIG PANEL */
.cfg{padding:1rem;overflow-y:auto;}
.fb-card{background:var(--bk2);border:0.5px solid var(--bd);border-radius:10px;padding:1rem;margin-bottom:10px;}
.fb-head{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:8px;}
.m-input{padding:5px 8px;font-size:14px;border-radius:5px;border:0.5px solid var(--bd);background:#1A1A1A;color:var(--wh);text-align:center;font-family:'Montserrat',sans-serif;width:100%;}
.col-hdr{font-size:10px;color:var(--wh2);text-align:center;}
.btn-gold{width:100%;margin-top:10px;padding:10px;font-size:13px;letter-spacing:2px;text-transform:uppercase;border-radius:6px;border:none;background:var(--gold);color:#0A0A0A;cursor:pointer;font-family:'Montserrat',sans-serif;font-weight:700;}
.save-status{text-align:center;font-size:10px;color:#5DCAA5;margin-top:6px;min-height:16px;letter-spacing:1px;}

/* RESPONSIVO CELULAR */
@media(max-width:480px){
  .sidebar{width:62px;}
  .metric-val{font-size:18px;}
  .metric-val.small{font-size:12px;}
  .tname{font-size:10px;}
  .cell-sem{font-size:13px;}
  .cell-tot{font-size:15px;}
  .cell-pos{font-size:11px;}
  .r1 .cell-pos{font-size:13px;}
  .logo-img{height:38px;}
}

/* RESPONSIVO TV */
@media(min-width:900px){
  .sidebar{width:130px;}
  .metric-lbl{font-size:9px;letter-spacing:2px;}
  .metric-val{font-size:38px;}
  .metric-val.small{font-size:24px;}
  .meta-pct-lbl{font-size:10px;}
  .live-lbl{font-size:8px;}
  .cs{font-size:9px;}
  .cs-dot,.live-dot{width:8px;height:8px;}
  .logo-img{height:72px;}
  .logo-sub{font-size:11px;}
  .month-badge{font-size:11px;}
  .nav-tab{font-size:12px;padding:12px;}
  .th-pos,.th-name,.th-sem,.th-tot{font-size:10px;padding:9px 4px;}
  .th-name{padding:9px 12px;}
  .tname{font-size:17px;}
  .tmeta{font-size:9px;}
  .cell-pos{font-size:20px;}
  .r1 .cell-pos{font-size:24px;}
  .cell-sem{font-size:24px;}
  .cell-sem .acum{font-size:9px;}
  .cell-tot{font-size:30px;}
  .cell-tot .pct{font-size:9px;}
  .tot-sem-val{font-size:22px;}
  .tot-tot-val{font-size:26px;}
  .tot-label{font-size:11px;letter-spacing:4px;padding:10px 14px;}
  .barmini{height:3px;margin-top:4px;}
}

@media(min-width:1440px){
  .sidebar{width:160px;}
  .metric-val{font-size:52px;}
  .metric-val.small{font-size:32px;}
  .tname{font-size:22px;}
  .cell-sem{font-size:30px;}
  .cell-tot{font-size:38px;}
  .cell-pos{font-size:26px;}
  .r1 .cell-pos{font-size:30px;}
  .logo-img{height:90px;}
}
</style>

          <input class="m-input" id="sel-s2" type="number" min="0" value="0" oninput="updateManual()"/>
          <input class="m-input" id="sel-s3" type="number" min="0" value="0" oninput="updateManual()"/>
          <input class="m-input" id="sel-s4" type="number" min="0" value="0" oninput="updateManual()"/>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
          <span style="font-size:11px;color:var(--wh2);">Meta</span>
          <input class="m-input" id="sel-meta" type="number" min="0" value="40" style="width:80px" oninput="updateManual()"/>
        </div>
      </div>
      <div class="fb-card">
        <div class="fb-head">Equipe Extra</div>
        <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:4px;">
          <div></div><div class="col-hdr">S1</div><div class="col-hdr">S2</div><div class="col-hdr">S3</div><div class="col-hdr">S4</div><div class="col-hdr">S5</div>
        </div>
        <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:8px;">
          <div style="font-size:12px;color:var(--gold);align-self:center;">Extra</div>
          <input class="m-input" id="ext-s0" type="number" min="0" value="0" oninput="updateManual()"/>
          <input class="m-input" id="ext-s1" type="number" min="0" value="0" oninput="updateManual()"/>
          <input class="m-input" id="ext-s2" type="number" min="0" value="0" oninput="updateManual()"/>
          <input class="m-input" id="ext-s3" type="number" min="0" value="0" oninput="updateManual()"/>
          <input class="m-input" id="ext-s4" type="number" min="0" value="0" oninput="updateManual()"/>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
          <span style="font-size:11px;color:var(--wh2);">Meta</span>
          <input class="m-input" id="ext-meta" type="number" min="0" value="40" style="width:80px" oninput="updateManual()"/>
        </div>
      </div>
      <div class="save-status" id="saveStatus"></div>
      <button class="btn-gold" onclick="goTab('ranking')">Ver ranking</button>
    </div>
  </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const CFG_CHIS={apiKey:"AIzaSyAStKygESgvDlcqL8AcPd2K6cQLDS4IpuQ",authDomain:"ranking-chis.firebaseapp.com",databaseURL:"https://ranking-chis-default-rtdb.firebaseio.com",projectId:"ranking-chis",appId:"1:817538775589:web:23e5710cad96ef674a1dcc"};
const CFG_DANYLO={apiKey:"AIzaSyCX7ocMbAK95WIKlTR-qSUojxEhDwb1mCo",authDomain:"homegr-71157.firebaseapp.com",databaseURL:"https://homegr-71157-default-rtdb.firebaseio.com",projectId:"homegr-71157",appId:"1:353566889780:web:aa363de0a0c3986a243761"};

let selWeek=null; // null = nenhuma semana expandida (mostra só total)
let vendasDia=0;
let dbManual=null, saveTimer=null;

let teams=[
  {nome:'Chis',   semanas:[], cotasFantasma:0, meta:70,  src:'firebase'},
  {nome:'Danylo', semanas:[], cotasFantasma:0, meta:100, src:'firebase'},
  {nome:'Select', semanas:[0,0,0,0,0], cotasFantasma:0, meta:40, src:'manual'},
  {nome:'Extra',  semanas:[0,0,0,0,0], cotasFantasma:0, meta:40, src:'manual'},
];

const meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
document.getElementById('monthBadge').textContent=meses[new Date().getMonth()]+' '+new Date().getFullYear();

function goTab(t){
  ['ranking','manual'].forEach(id=>document.getElementById('panel-'+id).classList.toggle('active',id===t));
  document.querySelectorAll('.nav-tab').forEach((el,i)=>el.classList.toggle('active',['ranking','manual'][i]===t));
}

function updateManual(){
  const sel=teams.find(t=>t.nome==='Select');
  const ext=teams.find(t=>t.nome==='Extra');
  for(let i=0;i<5;i++){
    sel.semanas[i]=parseInt(document.getElementById('sel-s'+i).value)||0;
    ext.semanas[i]=parseInt(document.getElementById('ext-s'+i).value)||0;
  }
  sel.meta=parseInt(document.getElementById('sel-meta').value)||40;
  ext.meta=parseInt(document.getElementById('ext-meta').value)||40;
  render();
  clearTimeout(saveTimer);
  saveTimer=setTimeout(saveManualToFirebase, 800);
}

function saveManualToFirebase(){
  if(!dbManual) return;
  const sel=teams.find(t=>t.nome==='Select');
  const ext=teams.find(t=>t.nome==='Extra');
  dbManual.ref('equipes_manuais').set({
    select:{semanas:sel.semanas, meta:sel.meta},
    extra:{semanas:ext.semanas, meta:ext.meta}
  }).then(()=>{
    const s=document.getElementById('saveStatus');
    if(s){s.textContent='Salvo ✓'; setTimeout(()=>s.textContent='',2000);}
  }).catch(e=>console.error(e));
}

function loadManualInputs(sel,ext){
  for(let i=0;i<5;i++){
    document.getElementById('sel-s'+i).value=sel.semanas[i]||0;
    document.getElementById('ext-s'+i).value=ext.semanas[i]||0;
  }
  document.getElementById('sel-meta').value=sel.meta||40;
  document.getElementById('ext-meta').value=ext.meta||40;
}

function getTotal(t){return (t.semanas||[]).reduce((a,b)=>a+(b||0),0)+(t.cotasFantasma||0);}

function somarSemanas(dados){
  const tot=[];
  Object.values(dados||{}).forEach(v=>{
    if(!v||v.s==null)return;
    const arr=Array.isArray(v.s)?v.s:Object.values(v.s);
    arr.forEach((val,i)=>{tot[i]=(tot[i]||0)+(Number(val)||0);});
  });
  return tot;
}

function render(){
  const maxW=Math.max(...teams.map(t=>(t.semanas||[]).length),2);
  const grand=teams.reduce((s,t)=>s+getTotal(t),0);
  const metaTot=teams.reduce((s,t)=>s+(t.meta||0),0);
  const pct=metaTot>0?Math.min(Math.round(grand/metaTot*100),100):0;

  document.getElementById('totCotas').textContent=grand;
  document.getElementById('vendasDia').textContent=vendasDia;
  document.getElementById('metaVal').textContent=metaTot;
  document.getElementById('metaPct').textContent=pct+'%';
  document.getElementById('metaFg').style.width=pct+'%';

  // Grid columns: pos(28px) + name(1fr) + semanas colapsadas/expandidas + total(52px)
  // Semana colapsada = 28px, expandida = 52px
  const semCols = Array.from({length:maxW},(_,i)=>
    selWeek===i ? '52px' : '28px'
  ).join(' ');
  const gridCols = `28px 1fr ${semCols} 52px`;

  // --- HEADER ---
  const head = document.getElementById('tblHead');
  head.style.gridTemplateColumns = gridCols;
  head.innerHTML = '';

  const thPos = document.createElement('div'); thPos.className='th-pos'; thPos.textContent='#'; head.appendChild(thPos);
  const thName = document.createElement('div'); thName.className='th-name'; thName.textContent='Equipe'; head.appendChild(thName);

  for(let i=0;i<maxW;i++){
    const th = document.createElement('div');
    th.className='th-sem'+(selWeek===i?' active-col':'');
    th.innerHTML = selWeek===i
      ? `<span style="font-size:6px;letter-spacing:1px;">Sem ${i+1}</span>`
      : `<span style="font-size:7px;writing-mode:vertical-rl;transform:rotate(180deg);letter-spacing:1px;">${i+1}</span>`;
    th.onclick=()=>{ selWeek=(selWeek===i?null:i); render(); };
    head.appendChild(th);
  }

  const thTot = document.createElement('div'); thTot.className='th-tot'; thTot.textContent='Total'; head.appendChild(thTot);

  // --- BODY ---
  const sorted=[...teams].sort((a,b)=>getTotal(b)-getTotal(a));
  const maxV=Math.max(...sorted.map(t=>getTotal(t)),1);
  const body=document.getElementById('tblBody');
  body.innerHTML='';

  // Totais por semana
  const semTots=Array.from({length:maxW},(_,i)=>teams.reduce((s,t)=>s+((t.semanas||[])[i]||0),0));

  sorted.forEach((t,i)=>{
    const totReal=getTotal(t);
    const bp=Math.round(totReal/maxV*100);
    const mp=t.meta>0?Math.round(totReal/t.meta*100):null;
    const cls=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const medal=i===0?'①':i===1?'②':i===2?'③':(i+1);

    const row=document.createElement('div');
    row.className='tbl-row '+cls;
    row.style.gridTemplateColumns=gridCols;

    // pos
    const cPos=document.createElement('div'); cPos.className='cell-pos'; cPos.textContent=medal; row.appendChild(cPos);
    // name
    const cName=document.createElement('div'); cName.className='cell-name';
    cName.innerHTML=`<div class="tname">${t.nome}</div>
      <div class="tmeta">meta ${t.meta}</div>
      <div class="barmini"><div class="barfill" style="width:${bp}%"></div></div>`;
    row.appendChild(cName);
    // semanas
    for(let s=0;s<maxW;s++){
      const val=(t.semanas||[])[s]||0;
      const acum=(t.semanas||[]).slice(0,s+1).reduce((a,b)=>a+(b||0),0);
      const cSem=document.createElement('div');
      cSem.className='cell-sem'+(selWeek===s?' active-col':'');
      cSem.onclick=()=>{ selWeek=(selWeek===s?null:s); render(); };
      if(selWeek===s){
        cSem.innerHTML=`${val}<span class="acum">↑${acum}</span>`;
      } else {
        cSem.innerHTML=`<span style="font-size:9px;font-weight:700;">${val}</span>`;
      }
      row.appendChild(cSem);
    }
    // total
    const cTot=document.createElement('div'); cTot.className='cell-tot';
    cTot.innerHTML=`${totReal}${mp!==null?`<span class="pct">${mp}%</span>`:''}`;
    row.appendChild(cTot);

    body.appendChild(row);
  });

  // --- TOTAL ROW ---
  const totRow=document.getElementById('tblTotal');
  totRow.style.gridTemplateColumns=gridCols;
  totRow.innerHTML='';
  const tl=document.createElement('div'); tl.className='tot-label'; tl.style.gridColumn=`1/3`; tl.textContent='TOTAL'; totRow.appendChild(tl);
  for(let s=0;s<maxW;s++){
    const tv=document.createElement('div'); tv.className='tot-sem-val';
    tv.style.borderLeft=(selWeek===s)?'1px solid var(--gold)':'1px solid var(--bd)';
    if(selWeek===s) tv.style.background='rgba(201,168,76,0.28)';
    tv.textContent=selWeek===s ? semTots[s] : '';
    totRow.appendChild(tv);
  }
  const tt=document.createElement('div'); tt.className='tot-tot-val'; tt.textContent=grand; totRow.appendChild(tt);
}

window.addEventListener('load',function(){
  try{
    const appC=firebase.initializeApp(CFG_CHIS,'chis');
    const appD=firebase.initializeApp(CFG_DANYLO,'danylo');
    const dbC=firebase.database(appC);
    const dbD=firebase.database(appD);

    dbC.ref('equipe_chis/config').on('value',s=>{
      const c=s.val()||{};
      const t=teams.find(x=>x.nome==='Chis');
      if(c.meta) t.meta=c.meta;
      if(c.cotasFantasma!=null) t.cotasFantasma=Number(c.cotasFantasma)||0;
      if(c.vendas_dia!=null) vendasDia=c.vendas_dia;
      render();
    });
    dbC.ref('equipe_chis/dados').on('value',s=>{
      const t=teams.find(x=>x.nome==='Chis');
      t.semanas=somarSemanas(s.val()||{});
      document.getElementById('dotChis').className='cs-dot ok';
      render();
    },e=>{document.getElementById('dotChis').className='cs-dot err';});

    dbD.ref('equipe_danylo/config').on('value',s=>{
      const c=s.val()||{};
      const t=teams.find(x=>x.nome==='Danylo');
      if(c.meta) t.meta=c.meta;
      if(c.cotasFantasma!=null) t.cotasFantasma=Number(c.cotasFantasma)||0;
      if(c.vendas_dia!=null) vendasDia+=Number(c.vendas_dia)||0;
      render();
    });
    dbD.ref('equipe_danylo/dados').on('value',s=>{
      const t=teams.find(x=>x.nome==='Danylo');
      const dados=s.val()||{};
      const vends={};
      Object.entries(dados).forEach(([k,v])=>{if(v&&v.s!=null)vends[k]=v;});
      t.semanas=somarSemanas(vends);
      document.getElementById('dotDanylo').className='cs-dot ok';
      render();
    },e=>{document.getElementById('dotDanylo').className='cs-dot err';});

    dbManual=dbD;
    dbD.ref('equipes_manuais').on('value',s=>{
      const d=s.val();
      if(!d) return;
      const sel=teams.find(x=>x.nome==='Select');
      const ext=teams.find(x=>x.nome==='Extra');
      if(d.select){ sel.semanas=d.select.semanas||[0,0,0,0,0]; sel.meta=d.select.meta||40; }
      if(d.extra){  ext.semanas=d.extra.semanas||[0,0,0,0,0];  ext.meta=d.extra.meta||40;  }
      loadManualInputs(sel,ext);
      render();
    },e=>{console.error('[Manual]',e.message);});

  }catch(e){console.error('ERRO:',e.message);}
});
render();
</script>
