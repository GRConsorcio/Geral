<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>GR Consórcio – Controle de Vendas</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Rajdhani:wght@400;500;600;700&display=swap" rel="stylesheet"/>
<style>
:root{
  --gold:#C9A84C;--gold-light:#E8C97A;--gold-dark:#8B6914;
  --bk:#0D0D0D;--bk2:#141414;--bk3:#1C1C1C;--bk4:#222222;
  --wh:#F0EAD6;--wh2:#A09880;
  --bd:rgba(201,168,76,0.18);
  --green:#5DCAA5;--red:#F0997B;
  --r1-bg:rgba(201,168,76,0.08);
  --r2-bg:rgba(180,180,180,0.04);
  --r3-bg:rgba(180,100,50,0.04);
}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bk);font-family:'Rajdhani',sans-serif;color:var(--wh);min-height:100vh;}

/* ── HEADER ─────────────────────────────── */
.hdr{
  background:var(--bk2);
  border-bottom:1px solid var(--bd);
  padding:.75rem 1rem;
  display:flex;align-items:center;justify-content:space-between;
  position:relative;
}
.hdr::after{
  content:'';position:absolute;bottom:0;left:0;right:0;height:1px;
  background:linear-gradient(90deg,transparent,var(--gold),transparent);
}
.hdr-left{display:flex;align-items:center;gap:10px;}
.live-badge{display:flex;align-items:center;gap:5px;font-size:10px;letter-spacing:2px;color:var(--green);text-transform:uppercase;background:rgba(93,202,165,0.1);border:0.5px solid rgba(93,202,165,0.3);padding:3px 10px;border-radius:20px;}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:blink 1.5s infinite;}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.hdr-title{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:4px;color:var(--gold);text-align:center;line-height:1;}
.hdr-sub{font-size:10px;letter-spacing:4px;color:var(--wh2);text-align:center;text-transform:uppercase;}
.hdr-right{display:flex;align-items:center;gap:12px;}
.conn-status{display:flex;gap:8px;}
.cs{display:flex;align-items:center;gap:4px;font-size:10px;letter-spacing:1px;color:var(--wh2);}
.cs-dot{width:7px;height:7px;border-radius:50%;background:#555;}
.cs-dot.ok{background:var(--green);}.cs-dot.err{background:var(--red);}.cs-dot.wait{background:var(--gold);animation:blink 1s infinite;}
.month-badge{font-size:10px;letter-spacing:2px;color:var(--gold);border:0.5px solid var(--bd);padding:3px 10px;border-radius:20px;text-transform:uppercase;}

/* ── NAV TABS ───────────────────────────── */
.nav-tabs{display:flex;background:var(--bk2);border-bottom:0.5px solid var(--bd);}
.nav-tab{flex:1;max-width:160px;padding:9px 8px;font-size:11px;letter-spacing:2px;text-transform:uppercase;text-align:center;color:var(--wh2);cursor:pointer;border:none;background:none;font-family:'Rajdhani',sans-serif;font-weight:600;border-bottom:2px solid transparent;transition:all .2s;}
.nav-tab.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(201,168,76,0.06);}
.panel{display:none;}.panel.active{display:block;}

/* ── MAIN LAYOUT: sidebar + content ─────── */
.main-layout{display:flex;height:calc(100vh - 88px);} /* 88px = hdr + nav approx */
.sidebar{
  width:140px;min-width:140px;
  background:var(--bk2);
  border-right:1px solid var(--bd);
  display:flex;flex-direction:column;
  overflow-y:auto;flex-shrink:0;
}
.content-area{flex:1;overflow:hidden;display:flex;flex-direction:column;min-width:0;}

/* sidebar blocks */
.sb-block{
  padding:1rem .85rem;
  border-bottom:0.5px solid var(--bd);
  display:flex;flex-direction:column;gap:4px;
  flex:1;justify-content:center;
}
.sb-block:last-child{border-bottom:none;}
.sb-lbl{font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--wh2);font-weight:600;line-height:1.3;}
.sb-val{font-family:'Bebas Neue',sans-serif;font-size:52px;color:var(--wh);line-height:1;margin-top:2px;}
.sb-val.gold{color:var(--gold);}
.sb-meta-txt{font-size:10px;color:var(--green);letter-spacing:1px;font-weight:600;}
.sb-pct-txt{font-size:11px;color:var(--wh2);letter-spacing:1px;}
.meta-bar-bg{height:3px;background:rgba(255,255,255,0.07);border-radius:2px;overflow:hidden;margin-top:4px;}
.meta-bar-fg{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--gold-dark),var(--gold));transition:width .8s ease;}
.sb-conn{display:flex;flex-direction:column;gap:6px;}
.cs{display:flex;align-items:center;gap:5px;font-size:10px;letter-spacing:1px;color:var(--wh2);}
.cs-dot{width:7px;height:7px;border-radius:50%;background:#555;flex-shrink:0;}
.cs-dot.ok{background:var(--green);}.cs-dot.err{background:var(--red);}.cs-dot.wait{background:var(--gold);animation:blink 1s infinite;}

/* ── WEEK TABS ──────────────────────────── */
.week-tabs{display:flex;background:var(--bk2);border-bottom:0.5px solid var(--bd);overflow-x:auto;}
.wtab{flex:1;min-width:60px;padding:8px 4px;font-size:10px;letter-spacing:2px;text-transform:uppercase;text-align:center;color:var(--wh2);cursor:pointer;border:none;background:none;font-family:'Rajdhani',sans-serif;font-weight:600;border-bottom:2px solid transparent;transition:all .2s;}
.wtab.active{color:var(--gold);border-bottom-color:var(--gold);background:rgba(201,168,76,0.06);}

/* ── TABLE ──────────────────────────────── */
.tbl-wrap{overflow-x:auto;}
table{width:100%;border-collapse:collapse;}
thead tr{background:var(--bk2);}
thead th{
  padding:10px 8px;
  font-size:9px;letter-spacing:2px;text-transform:uppercase;
  color:var(--gold-dark);font-weight:700;text-align:center;
  border-bottom:1px solid var(--bd);border-right:0.5px solid rgba(201,168,76,0.08);
}
thead th:first-child{text-align:left;padding-left:14px;width:36%;}
thead th:last-child{border-right:none;color:var(--gold);}

tbody tr{border-bottom:0.5px solid rgba(201,168,76,0.06);transition:background .15s;}
tbody tr:hover{background:rgba(201,168,76,0.04);}
tbody tr.r1{background:var(--r1-bg);}
tbody tr.r2{background:var(--r2-bg);}
tbody tr.r3{background:var(--r3-bg);}

tbody td{padding:11px 8px;text-align:center;border-right:0.5px solid rgba(201,168,76,0.06);vertical-align:middle;}
tbody td:first-child{text-align:left;padding-left:14px;border-right:0.5px solid rgba(201,168,76,0.1);}
tbody td:last-child{border-right:none;}

.td-name-wrap{display:flex;align-items:center;gap:10px;}
.pos-medal{font-family:'Bebas Neue',sans-serif;font-size:18px;color:var(--wh2);min-width:24px;text-align:center;}
.r1 .pos-medal{color:var(--gold);font-size:20px;}
.r2 .pos-medal{color:#C0C0C0;}
.r3 .pos-medal{color:#CD7F32;}
.team-info{}
.tname{font-size:15px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--wh);line-height:1;}
.r1 .tname{color:var(--gold-light);}
.tsrc{font-size:9px;letter-spacing:1px;color:var(--wh2);opacity:.5;font-weight:400;}
.barmini{height:2px;background:rgba(255,255,255,0.06);border-radius:1px;margin-top:4px;overflow:hidden;min-width:60px;}
.barfill{height:100%;border-radius:1px;background:var(--gold);transition:width .6s ease;}
.r2 .barfill{background:#C0C0C0;}.r3 .barfill{background:#CD7F32;}

.cell-val{font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--wh2);}
.cell-val.tot{font-size:24px;color:var(--wh);}
.r1 .cell-val.tot{color:var(--gold);}
.mpct{font-size:9px;color:var(--gold-dark);display:block;font-weight:500;line-height:1;margin-top:1px;}

/* total row */
tfoot tr{background:var(--bk2);}
tfoot td{
  padding:11px 8px;text-align:center;
  border-top:1px solid var(--bd);border-right:0.5px solid rgba(201,168,76,0.08);
  font-family:'Bebas Neue',sans-serif;font-size:20px;color:var(--gold);
}
tfoot td:first-child{text-align:left;padding-left:14px;font-family:'Rajdhani',sans-serif;font-size:10px;letter-spacing:3px;text-transform:uppercase;font-weight:700;color:var(--gold);vertical-align:middle;}
tfoot td:last-child{font-size:24px;border-right:none;}

/* ── LOG BOX ────────────────────────────── */
.log-box{margin:8px 12px;background:#090909;border:0.5px solid var(--bd);border-radius:8px;padding:7px 12px;font-size:11px;color:var(--green);line-height:1.8;font-family:monospace;max-height:60px;overflow-y:auto;}

/* ── MANUAL PANEL ───────────────────────── */
.cfg{padding:1rem;}
.fb-card{background:var(--bk2);border:0.5px solid var(--bd);border-radius:10px;padding:1rem;margin-bottom:10px;}
.fb-head{font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--gold);margin-bottom:10px;font-weight:700;}
.col-hdr{font-size:10px;color:var(--wh2);text-align:center;letter-spacing:1px;}
.m-input{padding:6px 8px;font-size:15px;border-radius:5px;border:0.5px solid var(--bd);background:#1A1A1A;color:var(--wh);text-align:center;font-family:'Rajdhani',sans-serif;font-weight:600;width:100%;}
.btn-gold{width:100%;margin-top:10px;padding:11px;font-size:13px;letter-spacing:3px;text-transform:uppercase;border-radius:6px;border:none;background:var(--gold);color:#0A0A0A;cursor:pointer;font-family:'Rajdhani',sans-serif;font-weight:700;}
.btn-gold:hover{background:var(--gold-light);}

/* ── SCROLLBAR ──────────────────────────── */
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:var(--bk);}
::-webkit-scrollbar-thumb{background:var(--bd);border-radius:2px;}
</style>
</head>
<body>

<!-- HEADER -->
<div class="hdr">
  <div class="hdr-left">
    <div class="live-badge"><span class="live-dot"></span>Ao vivo</div>
    <div class="conn-status">
      <span class="cs"><span class="cs-dot wait" id="dotChis"></span>Chis</span>
      <span class="cs"><span class="cs-dot wait" id="dotDanylo"></span>Danylo</span>
    </div>
  </div>
  <div>
    <div class="hdr-title">GR Consórcio</div>
    <div class="hdr-sub">Ranking de Equipes</div>
  </div>
  <div class="hdr-right">
    <div class="month-badge" id="monthBadge">—</div>
  </div>
</div>

<!-- NAV TABS -->
<div class="nav-tabs">
  <button class="nav-tab active" onclick="goTab('ranking')">Ranking</button>
  <button class="nav-tab" onclick="goTab('manual')">Select &amp; Extra</button>
</div>

<!-- RANKING PANEL -->
<div class="panel active" id="panel-ranking">
  <div class="main-layout">

    <!-- SIDEBAR -->
    <div class="sidebar">

      <div class="sb-block">
        <div class="sb-lbl">GR Consórcio</div>
        <div style="font-size:9px;letter-spacing:2px;color:var(--gold);text-transform:uppercase;margin-top:2px;" id="monthBadge2">—</div>
      </div>

      <div class="sb-block">
        <div class="sb-lbl">Vendas<br>do dia</div>
        <div class="sb-val" id="vendasDia">0</div>
      </div>

      <div class="sb-block">
        <div class="sb-lbl">Vendas<br>no mês</div>
        <div class="sb-val" id="totCotas">0</div>
        <div class="sb-meta-txt" id="metaTxt">—</div>
        <div class="meta-bar-bg"><div class="meta-bar-fg" id="metaFg" style="width:0%"></div></div>
      </div>

      <div class="sb-block">
        <div class="sb-lbl">Taxa de<br>conversão</div>
        <div class="sb-val gold" style="font-size:36px;" id="metaPct">—</div>
      </div>

      <div class="sb-block" style="flex:0;padding:.75rem .85rem;">
        <div class="sb-lbl" style="margin-bottom:6px;">Conexões</div>
        <div class="sb-conn">
          <span class="cs"><span class="cs-dot wait" id="dotChis"></span>Chis</span>
          <span class="cs"><span class="cs-dot wait" id="dotDanylo"></span>Danylo</span>
        </div>
      </div>

    </div>

    <!-- CONTENT -->
    <div class="content-area">
      <!-- WEEK TABS -->
      <div class="week-tabs" id="weekTabs"></div>

      <!-- TABLE -->
      <div class="tbl-wrap" style="flex:1;overflow:auto;">
        <table>
          <thead>
            <tr id="tblHead">
              <th>Equipe</th>
              <th>Total</th>
            </tr>
          </thead>
          <tbody id="rankRows"></tbody>
          <tfoot>
            <tr id="totRow">
              <td>Total geral</td>
              <td id="totGeral">—</td>
            </tr>
          </tfoot>
        </table>
      </div>

      <div class="log-box" id="logBox">Aguardando Firebase...</div>
    </div>

  </div>
</div>

<!-- MANUAL PANEL -->
<div class="panel" id="panel-manual">
  <div class="cfg">
    <div class="fb-card">
      <div class="fb-head">Equipe Select</div>
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:4px;">
        <div></div><div class="col-hdr">S1</div><div class="col-hdr">S2</div><div class="col-hdr">S3</div><div class="col-hdr">S4</div><div class="col-hdr">S5</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:8px;">
        <div style="font-size:13px;color:var(--gold);align-self:center;font-weight:700;">Select</div>
        <input class="m-input" id="sel-s0" type="number" min="0" value="0" oninput="updateManual()"/>
        <input class="m-input" id="sel-s1" type="number" min="0" value="0" oninput="updateManual()"/>
        <input class="m-input" id="sel-s2" type="number" min="0" value="0" oninput="updateManual()"/>
        <input class="m-input" id="sel-s3" type="number" min="0" value="0" oninput="updateManual()"/>
        <input class="m-input" id="sel-s4" type="number" min="0" value="0" oninput="updateManual()"/>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
        <span style="font-size:11px;color:var(--wh2);letter-spacing:2px;text-transform:uppercase;">Meta</span>
        <input class="m-input" id="sel-meta" type="number" min="0" value="40" style="width:80px" oninput="updateManual()"/>
      </div>
    </div>
    <div class="fb-card">
      <div class="fb-head">Equipe Extra</div>
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:4px;">
        <div></div><div class="col-hdr">S1</div><div class="col-hdr">S2</div><div class="col-hdr">S3</div><div class="col-hdr">S4</div><div class="col-hdr">S5</div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(6,1fr);gap:4px;margin-bottom:8px;">
        <div style="font-size:13px;color:var(--gold);align-self:center;font-weight:700;">Extra</div>
        <input class="m-input" id="ext-s0" type="number" min="0" value="0" oninput="updateManual()"/>
        <input class="m-input" id="ext-s1" type="number" min="0" value="0" oninput="updateManual()"/>
        <input class="m-input" id="ext-s2" type="number" min="0" value="0" oninput="updateManual()"/>
        <input class="m-input" id="ext-s3" type="number" min="0" value="0" oninput="updateManual()"/>
        <input class="m-input" id="ext-s4" type="number" min="0" value="0" oninput="updateManual()"/>
      </div>
      <div style="display:flex;justify-content:space-between;align-items:center;gap:8px;">
        <span style="font-size:11px;color:var(--wh2);letter-spacing:2px;text-transform:uppercase;">Meta</span>
        <input class="m-input" id="ext-meta" type="number" min="0" value="40" style="width:80px" oninput="updateManual()"/>
      </div>
    </div>
    <button class="btn-gold" onclick="goTab('ranking')">Ver ranking</button>
  </div>
</div>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script>
const CFG_CHIS={apiKey:"AIzaSyAStKygESgvDlcqL8AcPd2K6cQLDS4IpuQ",authDomain:"ranking-chis.firebaseapp.com",databaseURL:"https://ranking-chis-default-rtdb.firebaseio.com",projectId:"ranking-chis",appId:"1:817538775589:web:23e5710cad96ef674a1dcc"};
const CFG_DANYLO={apiKey:"AIzaSyCX7ocMbAK95WIKlTR-qSUojxEhDwb1mCo",authDomain:"homegr-71157.firebaseapp.com",databaseURL:"https://homegr-71157-default-rtdb.firebaseio.com",projectId:"homegr-71157",appId:"1:353566889780:web:aa363de0a0c3986a243761"};

let selWeek='total', vendasDia=0;
let teams=[
  {nome:'Chis',  semanas:[], cotasFantasma:0, meta:70,  src:'firebase'},
  {nome:'Danylo',semanas:[], cotasFantasma:0, meta:100, src:'firebase'},
  {nome:'Select',semanas:[0,0,0,0,0], cotasFantasma:0, meta:40, src:'manual'},
  {nome:'Extra', semanas:[0,0,0,0,0], cotasFantasma:0, meta:40, src:'manual'},
];

const meses=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'];
document.getElementById('monthBadge').textContent=meses[new Date().getMonth()]+' '+new Date().getFullYear();

function log(m){const b=document.getElementById('logBox');b.textContent+='\n'+m;b.scrollTop=b.scrollHeight;}
function goTab(t){
  ['ranking','manual'].forEach(id=>document.getElementById('panel-'+id).classList.toggle('active',id===t));
  document.querySelectorAll('.nav-tab').forEach((el,i)=>el.classList.toggle('active',['ranking','manual'][i]===t));
}
function updateManual(){
  const sel=teams.find(t=>t.nome==='Select');
  const ext=teams.find(t=>t.nome==='Extra');
  for(let i=0;i<5;i++){
    sel.semanas[i]=parseInt(document.getElementById('sel-s'+i).value)||0;
    ext.semanas[i]=parseInt(document.getElementById('ext-s'+i).value)||0;
  }
  sel.meta=parseInt(document.getElementById('sel-meta').value)||40;
  ext.meta=parseInt(document.getElementById('ext-meta').value)||40;
  render();
}
function getTotal(t){return (t.semanas||[]).reduce((a,b)=>a+(b||0),0)+(t.cotasFantasma||0);}
function getVal(t,week){
  if(week==='total') return getTotal(t);
  return (t.semanas||[])[parseInt(week)]||0;
}
function somarSemanas(dados){
  const tot=[];
  Object.values(dados||{}).forEach(v=>{
    if(!v||v.s==null)return;
    const arr=Array.isArray(v.s)?v.s:Object.values(v.s);
    arr.forEach((val,i)=>{tot[i]=(tot[i]||0)+(Number(val)||0);});
  });
  return tot;
}
function medalIcon(i){
  if(i===0) return '🥇';
  if(i===1) return '🥈';
  if(i===2) return '🥉';
  return (i+1);
}

function render(){
  const maxW=Math.max(...teams.map(t=>(t.semanas||[]).length),2);

  // week tabs
  const wt=document.getElementById('weekTabs');
  wt.innerHTML='';
  const mk=(lbl,val)=>{const b=document.createElement('button');b.className='wtab'+(selWeek===val?' active':'');b.textContent=lbl;b.onclick=()=>{selWeek=val;render();};wt.appendChild(b);};
  mk('Total','total');
  for(let i=0;i<maxW;i++) mk('Sem.'+(i+1),String(i));

  // table header
  const thead=document.getElementById('tblHead');
  thead.innerHTML='<th style="text-align:left;padding-left:14px;">Equipe</th>';
  for(let i=0;i<maxW;i++){
    const th=document.createElement('th');
    th.textContent='S'+(i+1);
    thead.appendChild(th);
  }
  const thTot=document.createElement('th');
  thTot.textContent='TOTAL';
  thTot.style.color='var(--gold)';
  thead.appendChild(thTot);

  // sort
  const sorted=[...teams].sort((a,b)=>getVal(b,selWeek)-getVal(a,selWeek));
  const maxV=Math.max(...sorted.map(t=>getVal(t,selWeek)),1);
  const grand=teams.reduce((s,t)=>s+getTotal(t),0);
  const metaTot=teams.reduce((s,t)=>s+(t.meta||0),0);
  const pct=metaTot>0?Math.min(Math.round(grand/metaTot*100),100):0;

  document.getElementById('totCotas').textContent=grand;
  document.getElementById('vendasDia').textContent=vendasDia;
  document.getElementById('metaVal').textContent=metaTot;
  document.getElementById('metaPct').textContent=pct+'%';
  document.getElementById('metaFg').style.width=pct+'%';
  document.getElementById('totGeral').textContent=grand;

  // rows
  const rows=document.getElementById('rankRows');
  rows.innerHTML='';
  sorted.forEach((t,i)=>{
    const v=getVal(t,selWeek);
    const totReal=getTotal(t);
    const bp=Math.round(v/maxV*100);
    const mp=t.meta>0?Math.round(totReal/t.meta*100):null;
    const cls=i===0?'r1':i===1?'r2':i===2?'r3':'';
    const tr=document.createElement('tr');
    tr.className=cls;

    // name cell
    let nameCell=`<td>
      <div class="td-name-wrap">
        <div class="pos-medal">${medalIcon(i)}</div>
        <div class="team-info">
          <div class="tname">${t.nome}</div>
          <div class="tsrc">${t.src==='firebase'?'⚡ live':'✎ manual'} · meta ${t.meta}</div>
          <div class="barmini"><div class="barfill" style="width:${bp}%"></div></div>
        </div>
      </div>
    </td>`;

    // week cells
    let weekCells='';
    for(let w=0;w<maxW;w++){
      const wv=(t.semanas||[])[w]||0;
      weekCells+=`<td><span class="cell-val">${wv}</span></td>`;
    }

    // total cell
    let totCell=`<td><span class="cell-val tot">${totReal}</span>${mp!==null?`<span class="mpct">${mp}% meta</span>`:''}</td>`;

    tr.innerHTML=nameCell+weekCells+totCell;
    rows.appendChild(tr);
  });

  // footer totals
  const totRow=document.getElementById('totRow');
  totRow.innerHTML='<td>Total geral</td>';
  for(let w=0;w<maxW;w++){
    const wSum=teams.reduce((s,t)=>s+((t.semanas||[])[w]||0),0);
    const td=document.createElement('td');
    td.textContent=wSum;
    totRow.appendChild(td);
  }
  const tdG=document.createElement('td');
  tdG.id='totGeral';
  tdG.textContent=grand;
  totRow.appendChild(tdG);
}

window.addEventListener('load',function(){
  log('Iniciando...');
  try{
    const appC=firebase.initializeApp(CFG_CHIS,'chis');
    const appD=firebase.initializeApp(CFG_DANYLO,'danylo');
    const dbC=firebase.database(appC);
    const dbD=firebase.database(appD);

    dbC.ref('equipe_chis/config').on('value',s=>{
      const c=s.val()||{};
      const t=teams.find(x=>x.nome==='Chis');
      if(c.meta) t.meta=c.meta;
      if(c.cotasFantasma!=null) t.cotasFantasma=Number(c.cotasFantasma)||0;
      if(c.vendas_dia!=null) vendasDia=c.vendas_dia;
      render();
    });
    dbC.ref('equipe_chis/dados').on('value',s=>{
      const t=teams.find(x=>x.nome==='Chis');
      t.semanas=somarSemanas(s.val()||{});
      document.getElementById('dotChis').className='cs-dot ok';
      log('[Chis] total='+getTotal(t));
      render();
    },e=>{document.getElementById('dotChis').className='cs-dot err';log('[Chis]ERR:'+e.message);});

    dbD.ref('equipe_danylo/config').on('value',s=>{
      const c=s.val()||{};
      const t=teams.find(x=>x.nome==='Danylo');
      if(c.meta) t.meta=c.meta;
      if(c.cotasFantasma!=null) t.cotasFantasma=Number(c.cotasFantasma)||0;
      if(c.vendas_dia!=null) vendasDia+=Number(c.vendas_dia)||0;
      log('[Danylo] config');
      render();
    });
    dbD.ref('equipe_danylo/dados').on('value',s=>{
      const t=teams.find(x=>x.nome==='Danylo');
      const dados=s.val()||{};
      const vends={};
      Object.entries(dados).forEach(([k,v])=>{if(v&&v.s!=null)vends[k]=v;});
      t.semanas=somarSemanas(vends);
      document.getElementById('dotDanylo').className='cs-dot ok';
      log('[Danylo] total='+getTotal(t));
      render();
    },e=>{document.getElementById('dotDanylo').className='cs-dot err';log('[Danylo]ERR:'+e.message);});

  }catch(e){log('ERRO:'+e.message);}
});
render();
</script>
</body>
</html>
